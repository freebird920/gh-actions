name: Service Keeper (Wake Up Service)

on:
  # 1. 10분마다 실행
  schedule:
    - cron: "*/10 * * * *"
  # 2. 코드 푸시할 때도 실행
  push:
    branches: [ "main" ]
  # 3. 수동 실행
  workflow_dispatch:

jobs:
  wake_up_all:
    runs-on: ubuntu-latest
    
    steps:
      # (Go 설치, 코드 체크아웃 필요 없음! 다 삭제)

      - name: Wake Up All Services (Curl)
        run: |
          echo "🔥 서버 대깨우기 작전 시작..."
          
          # 공통 헤더 변수
          READ_HEADER="Authorization: Bearer ${{ secrets.HF_READ_TOKEN }}"
          WORKER_HEADER="Authorization: Bearer ${{ secrets.HF_SLAT_KEY }}"

          # ---------------------------------------------------------
          # 1. 일반 서비스 (GET /openapi.json) - 가볍게 찌르기
          # ---------------------------------------------------------
          echo "--- Light Wake Up ---"
          curl -s -o /dev/null -w "%{http_code} Reranker\n" -X GET https://freebird920-slat-reranker.hf.space/openapi.json -H "$READ_HEADER"
          curl -s -o /dev/null -w "%{http_code} Crawler Master\n" -X GET https://freebird920-slat-crawler-master.hf.space/openapi.json -H "$READ_HEADER"
          curl -s -o /dev/null -w "%{http_code} Crawler 1\n" -X GET https://freebird920-slat-crawler-1.hf.space/openapi.json -H "$READ_HEADER"
          curl -s -o /dev/null -w "%{http_code} Reamer-AIS\n" -X GET https://freebird920-slat-reamer-hf-ais.hf.space/openapi.json -H "$READ_HEADER"

          # ---------------------------------------------------------
          # 2. 임베딩 서버 (POST /embed) - 무겁게 찌르기 (Heavy Inference)
          # 실제 텍스트를 보내서 CPU/GPU가 일을 하게 만듭니다.
          # ---------------------------------------------------------
          echo "--- Heavy Wake Up (Embedding) ---"
          
          # 주의: curl로 보낼 때는 JSON 형식을 직접 써줘야 합니다.
          # KoE5 모델이므로 "text" 필드 안에 "query: " 접두어 포함!
          curl -s -o /dev/null -w "%{http_code} Embedder-01\n" \
            -X POST https://freebird920-slat-reamer-hf-query-embeder-01.hf.space/embed \
            -H "Content-Type: application/json" \
            -H "$WORKER_HEADER" \
            -d '{"text": "query: wake_up_check"}'

          echo "✅ 모든 서버 기상 완료!"